services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: counseling_simulator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Not published in production. Exposed locally for debugging only.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d counseling_simulator"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # Loads the AI provider and model names from backend/.env.
    env_file:
      - .env
    # These override anything in .env: DATABASE_URL must point at the "db"
    # service (not localhost) when running inside the compose network.
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/counseling_simulator
      APP_ENV: development
      DEBUG: "true"
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      GOOGLE_APPLICATION_CREDENTIALS: /gcloud/application_default_credentials.json
    volumes:
      - ${HOME}/.config/gcloud:/gcloud:ro
    ports:
      - "8000:8000"

volumes:
  postgres_data:
